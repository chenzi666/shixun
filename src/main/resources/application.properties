spring.application.name=glw

# 횄혘횂짝횄혗횂혮횄혗횂째횄혘횂짝횄혗횂혥횄혗횂짰횄혘횂짜횄혗횂쨘횄혗횂혫횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
spring.datasource.url=jdbc:mysql://localhost:3306/gl_travel_portal?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true&useInformationSchema=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.example.glw.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 횄혘횂짝횄혗횂혰횄혗횂짜횄혘횂짜횄혗횂쩔횄혗횂혰횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
logging.level.org.example.glw.mapper=debug
logging.level.org.example.glw.service=info
logging.level.org.example.glw.controller=info

# 횄혘횂짝횄혗횂혵횄혗횂혥횄혘횂짜횄혗횂혡횄혗횂징횄혘횂짜횄혗횂혲횄혗횂짢횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
server.port=8080
server.servlet.context-path=/

# JWT챕혚혥챌쩍짰
jwt.secret=gl_travel_portal_secret_key_for_jwt_hmac_sha256_algorithm_32_bytes
jwt.expiration=604800000

# 횄혘횂짤횄혗횂짧횄혗횂혣횄혘횂짢횄혗횂짱횄혗횂혖횄혘횂짠횄혗횂혻횄혗횂혖횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
verification.code.expiration=300000

# 횄혘횂짝횄혗횂혯횄혗횂혝횄혘횂짚횄혗횂쨩횄혗횂쨋횄혘횂짚횄혗횂쨍횄혗횂혡횄혘횂짚횄혗횂쩌횄혗횂혻횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 횄혘횂짝횄혗횂혯횄혗횂혝횄혘횂짚횄혗횂쨩횄혗횂쨋횄혘횂짜횄혗횂짯횄혗횂혱횄혘횂짜횄혗횂혗횄혗횂짢횄혘횂짢횄혗횂쨌횄혗횂짱횄혘횂짜횄혗횂쩐횄혗횂혙횄혘횂짤횄혗횂혚횄혗횂혥횄혘횂짠횄혗횂쩍횄혗횂짰
file.upload.path=./uploads/
file.upload.image.path=./uploads/images/
file.upload.video.path=./uploads/videos/